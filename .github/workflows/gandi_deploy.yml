name: Deploy to Gandi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup SSH
        env:
          GANDI_URL_SECRET: ${{ secrets.GANDI_GIT_URL }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GANDI_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Add Gandi git server to known hosts by safely explicitly matching the domain
          GANDI_HOST=$(echo "$GANDI_URL_SECRET" | grep -oE 'git\.[a-z0-9.-]+\.gpaas\.net' | head -n 1 || true)
          if [ -n "$GANDI_HOST" ]; then
            ssh-keyscan -p 22 -H "$GANDI_HOST" >> ~/.ssh/known_hosts
          else
            echo "Warning: Could not extract host for ssh-keyscan"
          fi

      - name: Create .env file and commit
        run: |
          # Create the .env file using GitHub Secrets
          echo "GOOGLE_SERVICE_ACCOUNT_EMAIL=${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}" >> .env
          echo "GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}" >> .env
          # Escape newlines carefully for the private key
          echo "GOOGLE_PRIVATE_KEY=\"${{ secrets.GOOGLE_PRIVATE_KEY }}\"" >> .env
          echo "PORT=8080" >> .env

          # Temporarily remove .env from .gitignore so we can push it to Gandi
          sed -i '/\.env/d' .gitignore || true

          # Configure git
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'

          # Commit the .env file locally
          git add .env .gitignore
          git commit -m "chore: Include .env for Gandi deployment"

      - name: Push to Gandi
        env:
          GANDI_URL_SECRET: ${{ secrets.GANDI_GIT_URL }}
        run: |
          USER_ID=$(echo "$GANDI_URL_SECRET" | grep -oE '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' | head -n 1 || true)
          GANDI_HOST=$(echo "$GANDI_URL_SECRET" | grep -oE 'git\.[a-z0-9.-]+\.gpaas\.net' | head -n 1 || true)

          if [ -z "$USER_ID" ] || [ -z "$GANDI_HOST" ]; then
            echo "Error: Could not extract Gandi username/host. Check your GANDI_GIT_URL secret."
            exit 1
          fi

          # Rebuild the final and clean Gandi URL
          GANDI_URL="ssh://${USER_ID}@${GANDI_HOST}/default.git"

          git remote add gandi "$GANDI_URL"
          # Force push the current HEAD to master
          GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no" git push gandi HEAD:master --force

      - name: Trigger Gandi Deploy
        env:
          GANDI_URL_SECRET: ${{ secrets.GANDI_GIT_URL }}
        run: |
          USER_ID=$(echo "$GANDI_URL_SECRET" | grep -oE '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' | head -n 1 || true)
          GANDI_HOST=$(echo "$GANDI_URL_SECRET" | grep -oE 'git\.[a-z0-9.-]+\.gpaas\.net' | head -n 1 || true)

          if [ -z "$USER_ID" ] || [ -z "$GANDI_HOST" ]; then
            echo "Error: Could not extract Gandi username/host. Check your GANDI_GIT_URL secret."
            exit 1
          fi

          EXTRACTED="${USER_ID}@${GANDI_HOST}"
          echo "Triggering deploy on $EXTRACTED..."
          ssh -o StrictHostKeyChecking=no "$EXTRACTED" deploy default.git
